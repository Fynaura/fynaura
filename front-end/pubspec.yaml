name: fynaura
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.4 <4.0.0"

dependencies:
  flutter_plugin_android_lifecycle: ^2.0.15
  image_picker: ^1.0.4
  flutter:
    sdk: flutter

  http: 1.3.0
  intl: ^0.18.0
  http_parser: ^4.1.2
  mime: ^2.0.0

  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  confetti: ^0.6.0
  fl_chart: ^0.70.2
  shared_preferences: ^2.4.0
  timezone: ^0.10.0
  flutter_local_notifications: ^19.0.0  # Local notifications plugin
  permission_handler: ^11.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/fynaura.png"  # Main image for app icon

flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - images/fynaura.png
    - images/fynaura-icon.png
    - images/google.png
    - images/fb.png
    - images/apple.png
    - images/cellphone.png
    - images/user.png
